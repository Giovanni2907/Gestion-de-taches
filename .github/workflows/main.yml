name: Dart CI

# Déclenche le workflow à chaque "push" ou "pull request" sur la branche principale
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code source du dépôt GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installe l'environnement Dart
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable # Utilise la dernière version stable de Dart

      # 3. Installe les dépendances du projet (comme le package 'test')
      - name: Install dependencies
        run: dart pub get

      # 4. Vérifie la qualité du code (analyse statique via analysis_options.yaml)
      - name: Analyze code syntax
        run: dart analyze --fatal-infos --fatal-warnings

      # 5. Exécute la suite de tests unitaires
      - name: Run tests
        run: dart test